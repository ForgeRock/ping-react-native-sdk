buildscript {
  ext.RNPingDeviceId = [
    kotlinVersion: "2.2.10",
    minSdkVersion: 29,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return RNPingDeviceId[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def newArchEnabled = project.hasProperty("newArchEnabled") &&
        project.newArchEnabled.toBoolean()

android {
  namespace "com.pingidentity.rndeviceid"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", newArchEnabled.toString()
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    debug {
      testCoverageEnabled true
    }
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  sourceSets {
    main {
      if (newArchEnabled) {
        java.srcDirs += ["src/newarch/java", "generated/java"]
      } else {
        java.srcDirs += ["src/oldarch/java"]
      }
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation("com.pingidentity.sdks:device-id:2.0.0")
  implementation("com.pingidentity.sdks:android:2.0.0")
  implementation(project(":ping-identity_rn-core"))
  testImplementation "junit:junit:4.13.2"
  testImplementation "io.mockk:mockk:1.13.12"
}

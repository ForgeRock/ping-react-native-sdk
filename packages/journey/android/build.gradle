buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['RNPingJourney_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def newArchEnabled = project.hasProperty("newArchEnabled") &&
    project.newArchEnabled.toBoolean()

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["RNPingJourney_" + name]).toInteger()
}

android {
  namespace "com.pingidentity.rnjourney"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", newArchEnabled.toString()
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    debug {
      testCoverageEnabled true
    }
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_21
    targetCompatibility JavaVersion.VERSION_21
  }

    kotlinOptions {
    jvmTarget = "21"
  }

  sourceSets {
    main {
      if (newArchEnabled) {
        java.srcDirs += ["src/newarch/java", "generated/java"]
      } else {
        java.srcDirs += ["src/oldarch/java"]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation("com.pingidentity.sdks:journey:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:android:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"

  implementation(project(":ping-identity_rn-core"))

  // SDKS-5217 Option C PoC — see packages/davinci/android/build.gradle

  testImplementation "junit:junit:4.13.2"
  testImplementation "androidx.test:core:1.6.1"
  testImplementation "org.robolectric:robolectric:4.12.2"
}

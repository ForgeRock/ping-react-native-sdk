buildscript {
  ext.RNPingDeviceProfile = [
    kotlinVersion: "2.2.10",
    minSdkVersion: 29,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return RNPingDeviceProfile[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

def newArchEnabled = project.hasProperty("newArchEnabled") &&
        project.newArchEnabled.toBoolean()

apply plugin: "com.facebook.react"

android {
  namespace "com.pingidentity.rndeviceprofile"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", newArchEnabled.toString()
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    debug {
      testCoverageEnabled true
    }
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_21
    targetCompatibility JavaVersion.VERSION_21
  }

    kotlinOptions {
    jvmTarget = "21"
  }

  sourceSets {
    main {
      if (newArchEnabled) {
        java.srcDirs += ["src/newarch/java", "generated/java"]
      } else {
        java.srcDirs += ["src/oldarch/java"]
      }
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation("com.pingidentity.sdks:device-profile:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:journey-plugin:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:device-root:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:logger:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
  implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0"
  implementation(project(":ping-identity_rn-core"))
  // Optional: enables LocationCollector support when present in the app.
  // We hardcode the version here to ensure the library builds with the necessary symbols.
  // This version is not transitive (compileOnly), so the consuming app controls the actual runtime version.
  compileOnly "com.google.android.gms:play-services-location:21.3.0"
  compileOnly "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.9.0"

  // SDKS-5217 Option C PoC — see packages/davinci/android/build.gradle

  testImplementation "junit:junit:4.13.2"
  testImplementation "io.mockk:mockk:1.13.9"
  testImplementation "org.robolectric:robolectric:4.11.1"
  testImplementation("com.pingidentity.sdks:device-profile:2.1.0")
}

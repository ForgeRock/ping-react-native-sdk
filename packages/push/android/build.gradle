buildscript {
  ext.RNPingPush = [
    kotlinVersion: "2.2.10",
    minSdkVersion: 29,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }
    return RNPingPush[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

repositories {
  mavenCentral()
  google()
}

def newArchEnabled = project.hasProperty("newArchEnabled") &&
        project.newArchEnabled.toBoolean()

android {
  namespace "com.pingidentity.rnpush"
  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", newArchEnabled.toString()
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_21
    targetCompatibility JavaVersion.VERSION_21
  }

  kotlinOptions {
    jvmTarget = "21"
  }

  sourceSets {
    main {
      if (newArchEnabled) {
        java.srcDirs += ["src/newarch/java", "generated/java"]
      } else {
        java.srcDirs += ["src/oldarch/java"]
      }
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation("com.pingidentity.sdks:push:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:commons:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:android:2.1.0") {
    exclude group: "io.ktor"
  }
  implementation("com.pingidentity.sdks:logger:2.1.0") {
    exclude group: "io.ktor"
  }
  // FCM is a peer dependency — host app adds the version via its own BOM
  implementation("com.google.firebase:firebase-messaging")
  implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0"
  implementation(project(":ping-identity_rn-core"))

  // SDKS-5217 Option C PoC — see packages/davinci/android/build.gradle

  testImplementation "junit:junit:4.13.2"
  testImplementation "io.mockk:mockk:1.13.12"
  testImplementation "org.robolectric:robolectric:4.11.1"
}

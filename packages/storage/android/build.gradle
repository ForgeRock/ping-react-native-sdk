buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['RNPingStorage_' + name]
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.7.2"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

def newArchEnabled = project.hasProperty("newArchEnabled") &&
        project.newArchEnabled.toBoolean()

println("[RNPingStorage] newArchEnabled = ${newArchEnabled}")

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["RNPingStorage_" + name]).toInteger()
}

android {
    namespace "com.pingidentity.reactnative.rnstorage"

    compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

    defaultConfig {
        minSdkVersion getExtOrIntegerDefault("minSdkVersion")
        targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    lintOptions {
        disable "GradleCompatible"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            if (newArchEnabled) {
                java.srcDirs += ["generated/java", "generated/jni"]
            } else {
                println("[RNPingStorage] Skipping generated/java and jni (New Arch disabled)")
                java.srcDirs -= ["generated/java", "generated/jni"]
            }
        }
    }
}

repositories {
    mavenCentral()
    google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation 'androidx.datastore:datastore-core:1.1.7'
    implementation("com.pingidentity.sdks:storage:2.0.0-beta1")
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
    implementation(project(":ping-identity_rn-core"))
    implementation(project(":ping-identity_rn-logger"))
    
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
    testImplementation "io.mockk:mockk:1.13.9"
    testImplementation "org.robolectric:robolectric:4.11.1"
}

//
// Disable all Turbo/JSI/CMake/codegen tasks
//
if (!newArchEnabled) {
    println("[RNPingStorage] Disabling TurboModule codegen + CMake tasks...")
    
    tasks.configureEach { task ->
        if (task.name.contains("Codegen") ||
            task.name.contains("generateCodegen") ||
            task.name.contains("generateSchema") ||
            task.name.contains("configureCMake") ||
            task.name.contains("externalNativeBuild") ||
            task.name.contains("buildCMake")
        ) {
            task.enabled = false
            println("[RNPingStorage] Disabled task: ${task.name}")
        }
    }
}

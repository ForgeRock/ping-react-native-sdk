buildscript {
  ext.RNPingOidc = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return RNPingOidc[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

def newArchEnabled = project.hasProperty("newArchEnabled") &&
        project.newArchEnabled.toBoolean()

android {
  namespace "com.pingidentity.rnoidc"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", newArchEnabled.toString()
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  sourceSets {
    main {
      if (newArchEnabled) {
        java.srcDirs += ["src/newarch/java", "generated/java"]
      } else {
        java.srcDirs += ["src/oldarch/java"]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation("com.pingidentity.sdks:android:2.0.0-beta1")
  implementation("com.pingidentity.sdks:oidc:2.0.0-beta1")
  implementation("com.pingidentity.sdks:browser:2.0.0-beta1")
  implementation("com.pingidentity.sdks:orchestrate:2.0.0-beta1")
  implementation("com.pingidentity.sdks:storage:2.0.0-beta1")
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
  implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3"
  implementation(project(":ping-identity_rn-core"))
  testImplementation "junit:junit:4.13.2"
  testImplementation "androidx.test:core:1.6.1"
  testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
  testImplementation "io.mockk:mockk:1.13.12"
  testImplementation "org.robolectric:robolectric:4.12.2"
}

buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['RNPingBrowser_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def newArchEnabled = project.hasProperty("newArchEnabled") &&
        project.newArchEnabled.toBoolean()

println("[RNPingBrowser] newArchEnabled = ${newArchEnabled}")

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["RNPingBrowser_" + name]).toInteger()
}

android {
  namespace "com.reactnativepingidentity.browser"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      if (newArchEnabled) {
        java.srcDirs += ["generated/java", "generated/jni"]
      } else {
        println("[RNPingBrowser] Skipping generated/java and jni (New Arch disabled)")
        java.srcDirs -= ["generated/java", "generated/jni"]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation("com.pingidentity.sdks:browser:1.3.0-beta2")
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
  implementation(project(":react-native-pingidentity-core"))
  testImplementation "junit:junit:4.13.2"
  testImplementation "androidx.test:core:1.6.1"
  testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
  testImplementation "io.mockk:mockk:1.13.12"
  testImplementation "org.robolectric:robolectric:4.12.2"
}

//
// Disable all Turbo/JSI/CMake/codegen tasks
//
if (!newArchEnabled) {
    println("[RNPingBrowser] Disabling TurboModule codegen + CMake tasks...")

    tasks.configureEach { task ->
        if (task.name.contains("Codegen") ||
            task.name.contains("generateCodegen") ||
            task.name.contains("generateSchema") ||
            task.name.contains("configureCMake") ||
            task.name.contains("externalNativeBuild") ||
            task.name.contains("buildCMake")
        ) {
            task.enabled = false
            println("[RNPingBrowser] Disabled task: ${task.name}")
        }
    }
}

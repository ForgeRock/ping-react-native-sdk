name: Generate Docs
on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

# Prevent multiple builds for the same PR/branch.
# Cancel any in-progress runs when new commits are pushed.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    generate-docs:
        runs-on: ubuntu-latest

        steps:
            # Checkout the repository with minimal history (depth: 1) for faster cloning.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1

            # Generate TypeDoc documentation for all packages using the composite action.
            - name: Build docs
              uses: ./.github/actions/docs-build

            # Upload generated documentation as an artifact for PR review.
            # Allows reviewers to preview documentation changes before merging.
            # Artifacts are retained for 7 days to reduce storage costs.
            - name: Upload docs artifact
              uses: actions/upload-artifact@v4
              with:
                  name: documentation
                  path: docs
                  retention-days: 7

name: Js Unit Tests
on:
    workflow_call:

jobs:
    js-unit-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        # TODO: remove continue-on-error after all test failures are fixed.
        continue-on-error: true

        steps:
            # Checkout with full history (fetch-depth: 0) for git-based test context.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 0

            # Setup Node.js environment and install all dependencies.
            - name: Setup
              uses: ./.github/actions/setup-proj

            # Execute Jest unit tests across all packages in the monorepo.
            - name: Run unit tests
              run: yarn test

name: Js Unit Tests
on:
  workflow_call:
    inputs:
      turbo_scm_base:
        required: true
        type: string
      turbo_scm_head:
        required: true
        type: string

# Permissions needed for dorny/test-reporter to create check runs.
permissions:
  contents: read
  checks: write

jobs:
  js-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    env:
      TURBO_SCM_BASE: ${{ inputs.turbo_scm_base }}
      TURBO_SCM_HEAD: ${{ inputs.turbo_scm_head }}

    steps:
      # Checkout with full history (fetch-depth: 0) for git-based test context.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Setup Node.js environment and install all dependencies.
      - name: Setup
        uses: ./.github/actions/setup-proj

      # Execute Jest unit tests with coverage across affected packages in the monorepo.
      - name: Run unit tests
        run: yarn test:affected:coverage

      # No affected packages (e.g. dependency-only changes) produce no report files;
      # dorny/test-reporter errors out on a missing-files glob regardless of fail-on-error.
      - name: Check for test report files
        id: check-reports
        if: always()
        run: |
          if compgen -G "packages/*/build/test-results/js/*.xml" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # Publish test results as GitHub check runs.
      - name: Publish test report
        if: always() && steps.check-reports.outputs.found == 'true'
        uses: dorny/test-reporter@v2
        with:
          name: JavaScript Unit Test Results
          path: 'packages/*/build/test-results/js/*.xml'
          reporter: jest-junit
          list-suites: 'all'
          list-tests: 'all'
          fail-on-error: 'false'

      # Upload coverage reports to Codecov.
      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: 'packages/*/build/coverage/lcov.info'
          flags: javascript
          fail_ci_if_error: false

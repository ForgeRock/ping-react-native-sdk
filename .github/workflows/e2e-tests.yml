name: E2E Tests

on:
  # push:
  #   branches: [main]
  # pull_request:
  #   types: [opened, reopened, synchronize]
  #   branches: [main]
  workflow_call:
  # TODO: Once lefthook is set up, this workflow will also be triggered as a
  # pre-push hook via the gh CLI, so that e2e tests run in GitHub Actions
  # before the push completes.

# Cancel in-progress runs for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── iOS E2E (macOS required for simulator) ────────────────────────────────
  e2e-ios:
    name: E2E — iOS Simulator
    runs-on: macos-26-xlarge
    timeout-minutes: 60
    defaults:
      run:
        working-directory: PingTestRunner

    env:
      XCODE_VERSION: ${{ vars.XCODE_VERSION || '26.4.1' }}
      RUBY_VERSION: '3.3.6'
      BUNDLE_GEMFILE: ${{ github.workspace }}/PingTestRunner/Gemfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-proj

      # Resolve Xcode: the pinned XCODE_VERSION may exist on the runner but lack the iOS simulator runtime
      # component (SDK ≠ runtime — the SDK ships inside Xcode but the runtime is provisioned separately).
      # This step prefers the pinned version but falls back to the newest installed Xcode whose major.minor
      # iOS version has a matching pre-provisioned simulator runtime, so the archive destination is always valid.
      - name: Resolve Xcode version
        run: |
          PINNED="/Applications/Xcode_${XCODE_VERSION}.app"
          SELECTED=""
          AVAILABLE_RUNTIMES=$(xcrun simctl list runtimes 2>/dev/null \
            | grep -i "iOS" | grep -v "unavailable" \
            | grep -oE "[0-9]+\.[0-9]+" | sort -u)
          for app in "$PINNED" $(ls -d /Applications/Xcode*.app 2>/dev/null | sort -rV); do
            [ -d "$app" ] || continue
            xcode_ios=$(DEVELOPER_DIR="$app/Contents/Developer" \
              xcodebuild -showsdks 2>/dev/null \
              | grep -i "iphonesimulator" | grep -oE "[0-9]+\.[0-9]+" | sort -rV | head -1)
            [ -n "$xcode_ios" ] || continue
            if echo "$AVAILABLE_RUNTIMES" | grep -qx "$xcode_ios"; then
              SELECTED="$app"
              echo "XCODE_RESOLVED_PATH=$app" >> "$GITHUB_ENV"
              echo "Resolved Xcode: $app (iOS SDK $xcode_ios, runtime available)"
              break
            else
              echo "Skipping $app: iOS $xcode_ios SDK present but runtime not provisioned (available: $(echo $AVAILABLE_RUNTIMES | tr '\n' ' '))"
            fi
          done
          [ -n "$SELECTED" ] || { echo "No Xcode with a matching provisioned iOS simulator runtime found"; exit 1; }

      - name: Select Xcode version
        run: sudo xcode-select -s "$XCODE_RESOLVED_PATH" && /usr/bin/xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install CocoaPods dependencies
        run: bundle exec pod install --project-directory=ios

      - name: Build E2E app (Release simulator)
        run: yarn build:e2e:ios

      - name: Run E2E tests
        run: yarn test:e2e:ios
        env:
          # Tier 1 tests always run — no server required.
          # Tier 2 journey/OIDC tests self-skip when these are not set.
          PING_SERVER_URL: ${{ secrets.PING_SERVER_URL }}
          PING_REALM_PATH: ${{ secrets.PING_REALM_PATH }}
          PING_COOKIE_NAME: ${{ secrets.PING_COOKIE_NAME }}
          PING_JOURNEY_NAME: ${{ secrets.PING_JOURNEY_NAME }}
          PING_TEST_USERNAME: ${{ secrets.PING_TEST_USERNAME }}
          PING_TEST_PASSWORD: ${{ secrets.PING_TEST_PASSWORD }}
          PING_DISCOVERY_ENDPOINT: ${{ secrets.PING_DISCOVERY_ENDPOINT }}
          PING_CLIENT_ID: ${{ secrets.PING_CLIENT_ID }}
          PING_REDIRECT_URI: ${{ secrets.PING_REDIRECT_URI }}
          PING_CALLBACK_TREES_ENABLED: ${{ secrets.PING_CALLBACK_TREES_ENABLED }}

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-ios
          path: PingTestRunner/artifacts/

  # ── Android E2E (emulator on ubuntu-latest) ───────────────────────────────
  e2e-android:
    name: E2E — Android Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: PingTestRunner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-proj

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build E2E app (Release APK)
        run: yarn build:e2e:android

      - name: Run E2E tests (emulator starts via Detox AVD)
        run: yarn test:e2e:android
        env:
          # Tier 1 tests always run — no server required.
          # Tier 2 journey/OIDC tests self-skip when these are not set.
          PING_SERVER_URL: ${{ secrets.PING_SERVER_URL }}
          PING_REALM_PATH: ${{ secrets.PING_REALM_PATH }}
          PING_COOKIE_NAME: ${{ secrets.PING_COOKIE_NAME }}
          PING_JOURNEY_NAME: ${{ secrets.PING_JOURNEY_NAME }}
          PING_TEST_USERNAME: ${{ secrets.PING_TEST_USERNAME }}
          PING_TEST_PASSWORD: ${{ secrets.PING_TEST_PASSWORD }}
          PING_DISCOVERY_ENDPOINT: ${{ secrets.PING_DISCOVERY_ENDPOINT }}
          PING_CLIENT_ID: ${{ secrets.PING_CLIENT_ID }}
          PING_REDIRECT_URI: ${{ secrets.PING_REDIRECT_URI }}
          PING_CALLBACK_TREES_ENABLED: ${{ secrets.PING_CALLBACK_TREES_ENABLED }}

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android
          path: PingTestRunner/artifacts/

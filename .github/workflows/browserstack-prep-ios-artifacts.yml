name: Prepare iOS BrowserStack artifacts

on:
  workflow_call:
    secrets:
      CERTIFICATES_FILE_BASE64:
        description: Apple signing certificate exported as base64 encoded .p12
        required: true
      CERTIFICATES_PASSWORD:
        description: Password for the Apple signing certificate .p12
        required: true
      KEYCHAIN_PASSWORD:
        description: Password for the temporary CI keychain
        required: true
      BUILD_PROVISION_PROFILE:
        description: Base64 encoded zip containing the iOS build provisioning profile
        required: true
      # XCUITest builds sign a separate UI test runner product in addition to the host app,
      # so CI needs a second provisioning profile unless one wildcard profile covers both IDs.
      # BrowserStack also asks for two separately-signed products — the host app
      # and test suite — each needing its own valid profile.
      UI_TEST_PROVISION_PROFILE:
        description: Base64 encoded zip containing the iOS UI test provisioning profile
        required: true
      APPLE_TEAM_ID:
        description: Apple Developer team identifier used for signing
        required: true

jobs:
  prepare-ios-bs-artifacts:
    name: Prepare iOS BrowserStack artifacts
    runs-on: macos-26-xlarge
    timeout-minutes: 60

    env:
      XCODE_VERSION: ${{ vars.XCODE_VERSION || '26.1.1' }}
      RUBY_VERSION: '2.6.10'
      BUNDLE_GEMFILE: ${{ github.workspace }}/PingTestRunner/Gemfile
      PING_TEST_RUNNER_DIR: PingTestRunner
      PING_TEST_RUNNER_IOS_DIR: PingTestRunner/ios

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup project dependencies
        uses: ./.github/actions/setup-proj

      # Xcode version must be pinned to match the iOS SDK used when building XCUITest artifacts for
      # BrowserStack real-device testing. Building with a newer Xcode (e.g. 26.x iOS SDK) produces
      # binaries that reference XCTest symbols not present on older iOS real devices (e.g.
      # _OBJC_CLASS_$_XCTCommandLineToolHelper), causing a dyld crash before any test runs.
      # The pinned version must target an SDK compatible with the oldest iOS version used in BrowserStack
      # test runs. These builds target real devices (-sdk iphoneos / generic/platform=iOS) — simulator
      # runtimes are not relevant here and must not be used as a selection gate.
      #
      # Root cause of prior failures:
      # 1. The original step used `xcrun simctl list runtimes` to gate Xcode selection. Because simulator
      #    runtimes are provisioned independently of Xcode on GitHub-hosted runners, the pinned Xcode was
      #    rejected whenever its matching simulator runtime was absent — even though this workflow never
      #    touches a simulator. This caused fallback to a newer Xcode (e.g. 26.4) whose XCTest SDK
      #    produced device binaries incompatible with iOS 17/18 BrowserStack devices.
      # 2. Switching to a directory existence check was not sufficient: Xcode can be installed on the
      #    runner without its device platform component (Platforms/iPhoneOS.platform). When the platform
      #    is missing, ibtool fails with "iOS X.Y Platform Not Installed" during storyboard compilation
      #    even though xcodebuild is present and reports a valid version. The fix therefore checks for
      #    the actual iPhoneOS SDK directory inside the Xcode bundle, which is what ibtool and actool
      #    require at build time.
      - name: Resolve Xcode version
        run: |
          # Check whether the iphoneos SDK platform component is installed inside a given Xcode app.
          has_iphoneos_sdk() {
            [ -d "$1/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs" ] \
              && ls "$1/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs"/iPhoneOS*.sdk 2>/dev/null | grep -q .
          }

          PINNED="/Applications/Xcode_${XCODE_VERSION}.app"
          if [ -d "$PINNED" ] && has_iphoneos_sdk "$PINNED"; then
            echo "XCODE_RESOLVED_PATH=$PINNED" >> "$GITHUB_ENV"
            echo "Resolved Xcode: $PINNED (pinned version ${XCODE_VERSION}, iphoneos SDK present)"
          else
            if [ -d "$PINNED" ]; then
              echo "::warning::Pinned Xcode ${XCODE_VERSION} found but iphoneos SDK platform not installed"
            else
              echo "::warning::Pinned Xcode ${XCODE_VERSION} not found at $PINNED"
            fi
            echo "Available Xcode installs (with iphoneos SDK):"
            AVAILABLE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V)
            for app in $AVAILABLE; do
              has_iphoneos_sdk "$app" && echo "  $app" || echo "  $app (no iphoneos SDK)"
            done
            # Pick the next version after the pinned one that has the iphoneos SDK installed
            NEXT=""
            for app in $(echo "$AVAILABLE" | sort -V); do
              ver=$(echo "$app" | grep -oE "Xcode_[0-9]+(\.[0-9]+)*" | sed 's/Xcode_//')
              [ -z "$ver" ] && continue
              if awk -v v="$ver" -v pin="${XCODE_VERSION}" 'BEGIN{exit !(v > pin)}' && has_iphoneos_sdk "$app"; then
                NEXT="$app"
                break
              fi
            done
            if [ -n "$NEXT" ]; then
              echo "XCODE_RESOLVED_PATH=$NEXT" >> "$GITHUB_ENV"
              echo "Falling back to next available version with iphoneos SDK: $NEXT"
            else
              echo "::error::Pinned Xcode ${XCODE_VERSION} unavailable and no newer version with iphoneos SDK found"
              exit 1
            fi
          fi

      - name: Select Xcode version
        run: sudo xcode-select -s "$XCODE_RESOLVED_PATH" && /usr/bin/xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install CocoaPods
        working-directory: ${{ env.PING_TEST_RUNNER_DIR }}
        run: bundle exec pod install --project-directory=ios

      - name: Install Apple certificate and provisioning profile
        env:
          CERTIFICATES_FILE_BASE64: ${{ secrets.CERTIFICATES_FILE_BASE64 }}
          CERTIFICATES_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          BUILD_PROVISION_PROFILE: ${{ secrets.BUILD_PROVISION_PROFILE }}
          UI_TEST_PROVISION_PROFILE: ${{ secrets.UI_TEST_PROVISION_PROFILE }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          APP_PROFILE_ZIP_PATH="$RUNNER_TEMP/build_profile.zip"
          APP_PROFILE_EXTRACT_DIR="$RUNNER_TEMP/build-profile"
          UI_TEST_PROFILE_ZIP_PATH="$RUNNER_TEMP/ui_test_profile.zip"
          UI_TEST_PROFILE_EXTRACT_DIR="$RUNNER_TEMP/ui-test-profile"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          APP_PROFILE_PLIST="$RUNNER_TEMP/build-profile.plist"
          UI_TEST_PROFILE_PLIST="$RUNNER_TEMP/ui-test-profile.plist"

          echo -n "$CERTIFICATES_FILE_BASE64" | base64 -D -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE" | base64 -D -o "$APP_PROFILE_ZIP_PATH"
          echo -n "$UI_TEST_PROVISION_PROFILE" | base64 -D -o "$UI_TEST_PROFILE_ZIP_PATH"
          unzip -o "$APP_PROFILE_ZIP_PATH" -d "$APP_PROFILE_EXTRACT_DIR"
          unzip -o "$UI_TEST_PROFILE_ZIP_PATH" -d "$UI_TEST_PROFILE_EXTRACT_DIR"

          APP_PROFILE_PATH="$(find "$APP_PROFILE_EXTRACT_DIR" -name '*.mobileprovision' | head -n 1)"
          UI_TEST_PROFILE_PATH="$(find "$UI_TEST_PROFILE_EXTRACT_DIR" -name '*.mobileprovision' | head -n 1)"
          if [ -z "$APP_PROFILE_PATH" ]; then
            echo "::error::No .mobileprovision file found in BUILD_PROVISION_PROFILE"
            exit 1
          fi
          if [ -z "$UI_TEST_PROFILE_PATH" ]; then
            echo "::error::No .mobileprovision file found in UI_TEST_PROVISION_PROFILE"
            exit 1
          fi

          security cms -D -i "$APP_PROFILE_PATH" > "$APP_PROFILE_PLIST"
          BUILD_PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$APP_PROFILE_PLIST")"
          BUILD_PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$APP_PROFILE_PLIST")"

          security cms -D -i "$UI_TEST_PROFILE_PATH" > "$UI_TEST_PROFILE_PLIST"
          UI_TEST_PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$UI_TEST_PROFILE_PLIST")"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$PROFILES_DIR"
          cp "$APP_PROFILE_PATH" "$PROFILES_DIR/${BUILD_PROFILE_UUID}.mobileprovision"
          cp "$UI_TEST_PROFILE_PATH" "$PROFILES_DIR/${UI_TEST_PROFILE_UUID}.mobileprovision"

          echo "BUILD_PROFILE_NAME=$BUILD_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "BUILD_PROFILE_UUID=$BUILD_PROFILE_UUID" >> "$GITHUB_ENV"
          echo "UI_TEST_PROFILE_UUID=$UI_TEST_PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Build SDK packages
        run: yarn packages:build

      - name: Generate export options plist for CI signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>development</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.pingidentity.rntestrunner</key>
              <string>${BUILD_PROFILE_NAME}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          plutil -lint "$RUNNER_TEMP/exportOptions.plist"
          echo "BS_IOS_EXPORT_OPTIONS_PLIST=$RUNNER_TEMP/exportOptions.plist" >> "$GITHUB_ENV"

      - name: Archive app and build test suite
        run: |
          export BS_IOS_ARCHIVE_XCODEBUILD_ARGS="DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE=$BUILD_PROFILE_UUID -allowProvisioningUpdates"
          export BS_IOS_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          export BS_IOS_APP_PROFILE_UUID="$BUILD_PROFILE_UUID"
          export BS_IOS_UI_TEST_PROFILE_UUID="$UI_TEST_PROFILE_UUID"
          export BS_IOS_TEST_SUITE_XCODEBUILD_ARGS="-allowProvisioningUpdates"
          yarn build:runner:bs:ios

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingtestrunner-ios-bs-app
          path: PingTestRunner/ios/build/browserstack/export/*.ipa
          if-no-files-found: error

      - name: Upload XCUITest suite artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingtestrunner-ios-bs-test-suite
          path: PingTestRunner/ios/build/browserstack-derived-data/Build/Products/Debug-iphoneos/PingTestRunnerUITests-Runner.zip
          if-no-files-found: error

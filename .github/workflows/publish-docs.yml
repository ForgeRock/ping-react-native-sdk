name: Publish Docs
on:
    push:
        branches:
            - main

# Required permissions for GitHub Pages deployment.
permissions:
    contents: write     # Required to push the generated docs to gh-pages

jobs:
    publish-docs:
        runs-on: ubuntu-latest

        steps:
            # Checkout the repository with minimal history for faster cloning.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1

            # Generate TypeDoc documentation for all packages using the composite action.
            - name: Build docs
              uses: ./.github/actions/docs-build

            # Deploy the documentation to GitHub Pages.
            # The deployment URL is captured in the output for reference.
            - uses: JamesIves/github-pages-deploy-action@62fec3add6773ec5dbbf18d2ee4260911aa35cf4 # v4.6.9
              with:
                  folder: docs
                  branch: gh-pages
                  clean-exclude: docs-preview
                  force: true

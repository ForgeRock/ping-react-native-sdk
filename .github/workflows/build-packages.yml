name: Build Packages
on:
    workflow_call:
        inputs:
            turbo_scm_base:
                required: true
                type: string
            turbo_scm_head:
                required: true
                type: string

jobs:
    build-packages:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        # TODO: remove continue-on-error after all build failures are fixed.
        continue-on-error: true
        env:
            TURBO_SCM_BASE: ${{ inputs.turbo_scm_base }}
            TURBO_SCM_HEAD: ${{ inputs.turbo_scm_head }}

        steps:
            # Checkout with full history (fetch-depth: 0) to enable affected packages detection.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 0

            # Setup Node.js environment and install all dependencies.
            - name: Setup
              uses: ./.github/actions/setup-proj

            # Build only packages affected by changes using Turborepo.
            # This optimizes build time by skipping unaffected packages.
            - name: Build affected packages
              run: yarn packages:build --affected
name: Build and Test iOS
on: 
    workflow_call:

env:
    # Define environment variables for the workflow.
    # These can be overridden by the caller if needed.
      WORKSPACE: PingSampleApp/ios/PingSampleApp.xcworkspace
      SCHEME: RNPackagesTests
      CONFIGURATION: Debug
      DESTINATION: platform=iOS Simulator,name=iPhone 16e,OS=latest
      DERIVED_DATA_PATH: DerivedData
      XCODE_VERSION: '26.1.1'
      RUBY_VERSION: '2.6.10'
      BUNDLE_GEMFILE: PingSampleApp/Gemfile
      IOS_DIRECTORY: PingSampleApp/ios
jobs:
    build-and-test-ios:
        runs-on: macos-15-large
        timeout-minutes: 35

        # TODO: remove continue-on-error after all build failures are fixed.
        continue-on-error: true

        steps:
            # Checkout with full history for git-based affected detection.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 0

            # Show versions of key tools for debugging and verification purposes.
            - name: Show tool versions
              run: |
                xcodebuild -version
                swift --version || true
                node --version || true
                ruby --version || true
          
            # Enable Corepack to manage yarn ensuring consistent dependency management across environments.
            - name: Enable Corepack
              run: corepack enable  
              
              # Setup Ruby for managing CocoaPods dependencies. 
            - name: Setup Ruby 
              uses: ruby/setup-ruby@v1
              with:
                ruby-version: ${{ env.RUBY_VERSION }}
                bundler-cache: true

            - name: Cache CocoaPods
              uses: actions/cache@v3
              with:
                path: |
                  ${{ env.IOS_DIRECTORY }}/Pods
                  ~/Library/Caches/CocoaPods
                  ~/.cocoapods
                key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
                restore-keys: |
                  ${{ runner.os }}-pods-

            # Cache DerivedData
            - name: Cache DerivedData
              uses: actions/cache@v3
              with:
                path: ${{ env.DERIVED_DATA_PATH }}
                key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-deriveddata-${{ hashFiles('PingSampleApp/ios/Podfile.lock', 'PingSampleApp/ios/PingSampleApp.xcodeproj/project.pbxproj', 'PingSampleApp/ios/PingSampleApp.xcodeproj/xcshareddata/xcschemes/RNPackagesTests.xcscheme', 'packages/*/*.podspec', 'packages/*/ios/**/*.swift', 'packages/*/ios/**/*.{m,mm,h,cpp}') }}
                restore-keys: |
                  ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-deriveddata-

              # Setup Node.js environment and install dependencies.
            - name: Setup project dependencies
              uses: ./.github/actions/setup-proj

            #Install CocoaPods
            - name: Install CocoaPods
              working-directory: ${{ env.IOS_DIRECTORY }}
              run: bundle exec pod install --repo-update
            
            # Select Xcode version
            - name: Select Xcode version
              run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app && /usr/bin/xcodebuild -version

            # Install xcresultparser to .xcresult files generated by xcodebuild for test reporting.
            - name: Install xcresultparser
              run: |
                curl -LO https://github.com/a7ex/xcresultparser/releases/download/1.9.3/xcresultparser.zip
                unzip xcresultparser.zip
                # Fix: The binary is inside the 'product' folder
                chmod +x product/xcresultparser
                sudo mv product/xcresultparser /usr/local/bin/ 

            # Reset only the target simulator to reduce state leakage without erasing all devices.
            - name: Prepare target simulator
              run: |
                xcrun simctl shutdown all || true
                xcrun simctl erase "iPhone 16e" || true
                xcrun simctl boot "iPhone 16e" || true
                xcrun simctl bootstatus "iPhone 16e" -b || true

            # Run iOS unit tests using xcodebuild.
            - name: Run iOS unit tests
              run: |
                set -o pipefail 
                xcodebuild \
                  -workspace ${{ env.WORKSPACE }} \
                  -scheme ${{ env.SCHEME }} \
                  -destination "${{ env.DESTINATION }}" \
                  -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
                  -resultBundlePath TestResults.xcresult \
                  -parallel-testing-enabled YES \
                  -parallel-testing-worker-count 2 \
                  test \
                  | xcbeautify \
                  | tee xcodebuild.log

              # Upload xcresult for debugging purposes
            - name: Upload xcresult (debug)
              if: always()
              uses: actions/upload-artifact@v7
              with:
                name: TestResults.xcresult
                path: TestResults.xcresult

              # Convert test results to JUnit format
            - name: Convert Test Results to JUnit
              if: always()
              run: xcresultparser -o junit TestResults.xcresult > test-report.xml

              # Publish the test results
            - name: Publish test results
              if: always()
              uses: dorny/test-reporter@v2
              with:
                name: Unit tests results
                path: test-report.xml
                reporter: java-junit
                list-suites: 'all'
                list-tests: 'all'
                fail-on-error: 'false'
name: Build and Test iOS
on:
  workflow_call:

env:
  # Define environment variables for the workflow.
  # These can be overridden by the caller if needed.
  WORKSPACE: PingTestRunner/ios/PingTestRunner.xcworkspace
  SCHEME: RNPackagesTests
  CONFIGURATION: Debug
  # DESTINATION is resolved dynamically at runtime by the "Resolve simulator" step.
  DERIVED_DATA_PATH: DerivedData
  XCODE_VERSION: '26.4.1'
  RUBY_VERSION: '2.6.10'
  BUNDLE_GEMFILE: ${{ github.workspace }}/PingTestRunner/Gemfile
  IOS_DIRECTORY: PingTestRunner/ios
jobs:
  build-and-test-ios:
    runs-on: macos-26-xlarge
    timeout-minutes: 35

    # TODO: remove continue-on-error after all build failures are fixed.
    continue-on-error: true

    steps:
      # Checkout with full history for git-based affected detection.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Show versions of key tools for debugging and verification purposes.
      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version || true
          node --version || true
          ruby --version || true

      # Enable Corepack to manage yarn ensuring consistent dependency management across environments.
      - name: Enable Corepack
        run: corepack enable

        # Setup Ruby for managing CocoaPods dependencies.
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.IOS_DIRECTORY }}/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # Cache DerivedData
      # Note: restore-keys is intentionally omitted. A partial/stale DerivedData cache
      # causes Clang module mtime mismatch errors when SDK framework files on the runner
      # are newer than the cached .pcm files. Only an exact cache hit is safe to restore.
      - name: Cache DerivedData
        uses: actions/cache@v3
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-deriveddata-${{ hashFiles('PingTestRunner/ios/Podfile.lock', 'PingTestRunner/ios/PingTestRunner.xcodeproj/project.pbxproj', 'PingTestRunner/ios/PingTestRunner.xcodeproj/xcshareddata/xcschemes/RNPackagesTests.xcscheme', 'packages/*/*.podspec', 'packages/*/ios/**/*.swift', 'packages/*/ios/**/*.{m,mm,h,cpp}') }}
        # Setup Node.js environment and install dependencies.
      - name: Setup project dependencies
        uses: ./.github/actions/setup-proj

      #Install CocoaPods
      - name: Install CocoaPods
        working-directory: ${{ env.IOS_DIRECTORY }}
        run: bundle exec pod install --repo-update

      # Select Xcode version
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app && /usr/bin/xcodebuild -version

      # Clang module caches are sensitive to SDK header mtimes on the runner image.
      # This must run AFTER Xcode is selected so the active SDK is finalised.
      # Keep the broader DerivedData cache for build products, but always force module
      # and SDK stat caches to be rebuilt to avoid stale .pcm restore failures.
      - name: Reset Xcode module caches
        run: |
          rm -rf "${{ github.workspace }}/${{ env.DERIVED_DATA_PATH }}/ModuleCache.noindex"
          rm -rf "${{ github.workspace }}/${{ env.DERIVED_DATA_PATH }}/SDKStatCaches.noindex"

      # Install xcresultparser to .xcresult files generated by xcodebuild for test reporting.
      - name: Install xcresultparser
        run: |
          curl -LO https://github.com/a7ex/xcresultparser/releases/download/1.9.3/xcresultparser.zip
          unzip xcresultparser.zip
          # Fix: The binary is inside the 'product' folder
          chmod +x product/xcresultparser
          sudo mv product/xcresultparser /usr/local/bin/

      # Resolve a simulator for Xcode 26.4.1 using xcrun simctl.
      # xcodebuild -showdestinations only returns placeholders on a fresh CI runner.
      # Pick the first iPhone from the iOS 26.4 runtime (matches the active Xcode SDK).
      # Sets DESTINATION and SIMULATOR_UDID in GITHUB_ENV for all subsequent steps.
      - name: Resolve simulator destination
        run: |
          echo "--- xcrun simctl list devices available ---"
          xcrun simctl list devices available
          echo "-------------------------------------------"
          SIMULATOR_UDID=$(xcrun simctl list devices "iOS 26.4" available | grep "iPhone" | grep -oE '[A-F0-9-]{36}' | head -1)
          [ -n "$SIMULATOR_UDID" ] || { echo "No eligible iPhone simulator found for iOS 26.4"; exit 1; }
          SIMULATOR_NAME=$(xcrun simctl list devices "iOS 26.4" available | grep "$SIMULATOR_UDID" | sed 's/ *(.*//' | xargs)
          echo "Resolved: ${SIMULATOR_NAME} (iOS 26.4) [${SIMULATOR_UDID}]"
          echo "DESTINATION=platform=iOS Simulator,id=${SIMULATOR_UDID}" >> "$GITHUB_ENV"
          echo "SIMULATOR_UDID=${SIMULATOR_UDID}" >> "$GITHUB_ENV"

      # Reset only the target simulator to reduce state leakage without erasing all devices.
      - name: Prepare target simulator
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl erase "${{ env.SIMULATOR_UDID }}" || true
          xcrun simctl boot "${{ env.SIMULATOR_UDID }}" || true
          xcrun simctl bootstatus "${{ env.SIMULATOR_UDID }}" -b || true

      # Run iOS unit tests using xcodebuild.
      - name: Run iOS unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            test \
            | xcbeautify \
            | tee xcodebuild.log

        # Upload xcresult for debugging purposes
      - name: Upload xcresult (debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult

        # Convert test results to JUnit format
      - name: Convert Test Results to JUnit
        if: always()
        run: xcresultparser -o junit TestResults.xcresult > test-report.xml

        # Convert coverage data to Cobertura format for reporting
      - name: Generate coverage report (Cobertura)
        if: always()
        continue-on-error: true
        run: xcresultparser -o cobertura TestResults.xcresult > coverage.xml

        # Upload coverage report to Codecov
      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: ios
          fail_ci_if_error: false

        # Publish the test results
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit tests results
          path: test-report.xml
          reporter: java-junit
          list-suites: 'all'
          list-tests: 'all'
          fail-on-error: 'false'

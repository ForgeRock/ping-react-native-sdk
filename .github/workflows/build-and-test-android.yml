name: Build and Test Android
on: 
    workflow_call:
        inputs:
            turbo_scm_base:
                required: true
                type: string
            turbo_scm_head:
                required: true
                type: string

# Permissions needed for dorny/test-reporter to create check runs.
permissions:
    contents: read
    checks: write
    
jobs:
    build-and-test-android:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        # TODO: remove continue-on-error after all build failures are fixed.
        continue-on-error: true
        env:
            TURBO_SCM_BASE: ${{ inputs.turbo_scm_base }}
            TURBO_SCM_HEAD: ${{ inputs.turbo_scm_head }}

        steps:
            # Checkout with full history for git-based affected detection.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 0

            # Setup Node.js environment and install dependencies.
            - name: Setup
              uses: ./.github/actions/setup-proj

            # Setup JDK 17 for Android testing.
            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '17'
                cache: gradle

            # Run Android unit tests using Gradle.
            - name: Run Android unit tests
              working-directory: PingSampleApp/android
              run: ./gradlew --no-daemon --stacktrace testDebugUnitTest

            # Publish test results as GitHub check runs.
            - name: Publish test report
              if: success() || failure()
              uses: dorny/test-reporter@v2
              with:
                name: Android Unit Test Results
                path: '**/build/test-results/android/*.xml'
                reporter: java-junit
                list-suites: 'all'
                list-tests: 'failed'
                fail-on-error: 'true'
                fail-on-empty: 'true'
            
            -  name: Upload Android unit tests HTML report
               if: success() || failure()
               uses: actions/upload-artifact@v3
               with:
                 name: Android Unit Test Report
                 path: '**/build/reports/tests/testDebugUnitTest/**'
            
            



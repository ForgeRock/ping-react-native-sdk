name: BrowserStack — Parse iOS Test Results

on:
  workflow_call:
    inputs:
      browserstack-build-id:
        description: BrowserStack XCUITest build ID to poll and report on
        type: string
        required: true

    secrets:
      BROWSERSTACK_USERNAME:
        description: BrowserStack account username
        required: true
      BROWSERSTACK_ACCESS_KEY:
        description: BrowserStack account access key
        required: true

jobs:
  parse-results:
    name: Parse iOS BrowserStack results
    runs-on: ubuntu-latest

    steps:
      - name: Wait for BrowserStack XCUITest build to finish
        timeout-minutes: 40
        shell: bash
        run: |
          set -euo pipefail

          build_id="${{ inputs.browserstack-build-id }}"
          echo "Polling BrowserStack build: $build_id"

          for attempt in $(seq 1 180); do
            response="$(curl --silent --fail-with-body \
              -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
              -X GET "https://api-cloud.browserstack.com/app-automate/xcuitest/v2/builds/${build_id}")"

            status="$(echo "$response" | jq -r '.status')"
            echo "Attempt $attempt — status: $status"

            case "$status" in
              passed)
                echo "✅ BrowserStack build passed."
                exit 0
                ;;
              failed|error|timedout)
                echo "::error::BrowserStack XCUITest build finished with status: $status"
                exit 1
                ;;
              null)
                echo "::error::Unexpected response (status is null): $response"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Timed out waiting for BrowserStack XCUITest build to complete."
          exit 1

      - name: Prepare test summary report
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          build_id="${{ inputs.browserstack-build-id }}"

          response="$(curl --silent --fail-with-body \
            -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
            -X GET "https://api-cloud.browserstack.com/app-automate/xcuitest/v2/builds/${build_id}")"

          echo "$response" > /tmp/bs-ios-results.json

          total_devices="$(jq '.devices | length' /tmp/bs-ios-results.json)"
          overall_status="$(jq -r '.status' /tmp/bs-ios-results.json)"
          summary=""
          failed_count=0

          for (( i=0; i<total_devices; i++ )); do
            device="$(jq -r ".devices[$i].device" /tmp/bs-ios-results.json)"
            os_version="$(jq -r ".devices[$i].os_version" /tmp/bs-ios-results.json)"
            session_status="$(jq -r ".devices[$i].sessions[0].status" /tmp/bs-ios-results.json)"

            if [ "$session_status" = "passed" ]; then
              emoji="✅"
            else
              emoji="❌"
              failed_count=$((failed_count + 1))
            fi

            summary+="📱 ${device} (iOS ${os_version}): ${emoji} ${session_status}\n"
          done

          build_url="https://app-automate.browserstack.com/dashboard/v2/builds/${build_id}"
          if [ "$failed_count" -eq 0 ]; then
            result_label="✅ Passed"
          else
            result_label="❌ Failed"
          fi

          {
            echo "## BrowserStack iOS XCUITest Summary"
            echo
            echo "- Build ID: \`${build_id}\`"
            echo "- Overall status: ${overall_status}"
            echo "- Result: ${result_label}"
            echo "- BrowserStack dashboard: ${build_url}"
            echo
            echo "### Device Results"
            echo
            echo -e "$summary"
          } >> "$GITHUB_STEP_SUMMARY"

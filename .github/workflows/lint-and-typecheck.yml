name: Lint and Typecheck
on:
    workflow_call:

jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # TODO: remove continue-on-error after all linting issues are fixed.
        continue-on-error: true

        steps:
            # Checkout with full history (fetch-depth: 0) to enable affected files detection.
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 0

            # Ensure base branch ref exists locally for Turborepo --affected git range.
            - name: Fetch base branch ref
              run: git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}"

            # Setup Node.js environment and install all dependencies.
            - name: Setup
              uses: ./.github/actions/setup-proj

            # Run ESLint on files affected by changes to validate code quality.
            - name: Lint affected files
              run: yarn lint --affected

            # Run TypeScript compiler on affected files to validate type safety.
            - name: Typecheck affected files
              run: yarn typecheck --affected

            # Verify code formatting with Prettier on affected files.
            - name: Check code formatting
              run: yarn prettier --affected

pluginManagement { includeBuild("../../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'PingTestRunner'

// Include only the :detox module from node_modules as a regular subproject
// (detox v20+ ships source only; its settings.gradle can't be used as a
// composite build because it re-includes @react-native/gradle-plugin
// under a conflicting build path).
include ':detox'
project(':detox').projectDir = file('../../node_modules/detox/android/detox')

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}
include ':app'
includeBuild('../../node_modules/@react-native/gradle-plugin')

include(":ping-identity_rn-binding")
project(":ping-identity_rn-binding").projectDir = file("../../packages/binding/android")
include(":ping-identity_rn-browser")
project(":ping-identity_rn-browser").projectDir = file("../../packages/browser/android")
include(":ping-identity_rn-core")
project(":ping-identity_rn-core").projectDir = file("../../packages/core/android")
include(":ping-identity_rn-device-id")
project(":ping-identity_rn-device-id").projectDir = file("../../packages/device-id/android")
include(":ping-identity_rn-device-profile")
project(":ping-identity_rn-device-profile").projectDir = file("../../packages/device-profile/android")
include(":ping-identity_rn-fido")
project(":ping-identity_rn-fido").projectDir = file("../../packages/fido/android")
include(":ping-identity_rn-journey")
project(":ping-identity_rn-journey").projectDir = file("../../packages/journey/android")
include(":ping-identity_rn-logger")
project(":ping-identity_rn-logger").projectDir = file("../../packages/logger/android")
include(":ping-identity_rn-oidc")

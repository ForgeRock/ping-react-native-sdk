apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native configuration for PingTestRunner.
 * Paths point three levels up because the app lives at
 * PingTestRunner/android/ inside the monorepo root.
 */
react {
    reactNativeDir = file("../../../node_modules/react-native")
    codegenDir = file("../../../node_modules/@react-native/codegen")
    cliFile = file("../../../node_modules/react-native/cli.js")

    // Explicitly set hermesc path — required when the Gradle plugin cannot
    // auto-detect the OS-specific bin directory from the monorepo root.
    def osName = System.getProperty("os.name").toLowerCase()
    if (osName.contains("mac") || osName.contains("darwin")) {
        hermesCommand = "$rootDir/../../node_modules/react-native/sdks/hermesc/osx-bin/hermesc"
    } else if (osName.contains("win")) {
        hermesCommand = "$rootDir/../../node_modules/react-native/sdks/hermesc/win64-bin/hermesc"
    } else {
        hermesCommand = "$rootDir/../../node_modules/react-native/sdks/hermesc/linux64-bin/hermesc"
    }

    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.pingtestrunner"
    defaultConfig {
        applicationId "com.pingtestrunner"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        manifestPlaceholders["appRedirectUriScheme"] = "org.forgerock.demo"
        // Enable Detox test orchestration
        testBuildType System.getProperty('testBuildType', 'debug')
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Detox ships a 'detox' flavor dimension; pick 'full' for e2e tests.
        missingDimensionStrategy 'detox', 'full'
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            proguardFile "${rootProject.projectDir}/../node_modules/detox/android/detox/proguard-rules-app.pro"
        }
    }
    packaging {
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
            excludes += "/META-INF/versions/9/OSGI-INF/MANIFEST.MF"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.google.android.gms:play-services-location:21.3.0")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.9.0")
    androidTestImplementation project(':detox')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 29
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    configurations.all {
        resolutionStrategy {
            force "androidx.test.core:core:1.6.1"
            // espresso-core ≤3.6.x calls getDeclaredMethod("getInstance") on
            // android.hardware.input.InputManager via reflection inside
            // InputManagerEventInjectionStrategy.initialize(). That no-arg static
            // method was removed from the Android framework in newer API levels,
            // causing a NoSuchMethodException crash at DetoxMain.initEspresso() before
            // any test can run — seen on both the local Pixel_10 (API 37) emulator and
            // on BrowserStack real devices. espresso-core 3.7.0 replaced the reflection
            // call with Context.getSystemService(InputManager.class) and is compatible
            // with all API levels we target. The @browserstack/detox package declares
            // espresso 3.6.1 transitively, so we force 3.7.0 here to override it.
            force "androidx.test.espresso:espresso-core:3.7.0"
            force "androidx.test.espresso:espresso-web:3.7.0"
            force "androidx.test.espresso:espresso-contrib:3.7.0"
            force "androidx.test:runner:1.6.2"
        }
    }
    // Provide a default appRedirectUriScheme for library modules that reference
    // this placeholder in their manifest (e.g. rn-browser).
    plugins.withId("com.android.library") {
        android.defaultConfig.manifestPlaceholders["appRedirectUriScheme"] = "org.forgerock.demo"
    }
}

// The :detox source module uses @ExperimentalStdlibApi APIs without opt-in
// annotations. Kotlin 2.1 treats missing opt-in as a compile error, so scope
// the compiler flag to that project only.
project(':detox') {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            freeCompilerArgs += ['-opt-in=kotlin.ExperimentalStdlibApi']
        }
    }
}

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 29
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    configurations.all {
        resolutionStrategy {
            force "androidx.test.core:core:1.6.1"
        }
    }
    repositories {
        maven {
            // BrowserStack Detox Android artifacts
            url("$rootDir/../node_modules/detox/Detox-android")
        }
    }
    // Provide a default appRedirectUriScheme for library modules that reference
    // this placeholder in their manifest (e.g. rn-browser).
    plugins.withId("com.android.library") {
        android.defaultConfig.manifestPlaceholders["appRedirectUriScheme"] = "org.forgerock.demo"
    }
}

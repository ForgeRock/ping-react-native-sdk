pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: '*.{js,ts,jsx,tsx,json,md,yml,yaml}'
      run: node_modules/.bin/prettier --check {staged_files}

    - name: lint
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn eslint --no-config-lookup --config eslint.config.mjs {staged_files}

    - name: copyright
      glob: '*.{js,ts,jsx,tsx,mjs,swift,kt,kts,java,yml,yaml,sh,gradle,podspec,mm,m,h,cpp,md}'
      run: scripts/check-copyright.sh {staged_files}

pre-push:
  jobs:
    - name: prettier
      run: yarn turbo clean && yarn prettier --affected

    - name: lint
      run: yarn lint --affected

    - name: typecheck
      run: yarn typecheck --affected
